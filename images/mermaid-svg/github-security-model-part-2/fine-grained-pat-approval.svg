<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 700" role="img" aria-labelledby="title desc">
  <title id="title">Fine-grained PAT 的组织审批链路</title>
  <desc id="desc">alice 创建 fine-grained PAT 后选择目标仓库和 Contents write 权限，如果组织需要审批则进入 Pending 并导致 workflow 使用 token 时返回 403，否则可以按授权访问。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .canvas { fill: #fbfcfd; }
      .title { font: 700 26px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #263238; }
      .node-title { font: 700 17px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #1d2730; text-anchor: middle; }
      .node-text { font: 13px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #37474f; text-anchor: middle; }
      .edge-label { font: 700 12px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #344955; text-anchor: middle; }
      .line { fill: none; stroke: #2f4858; stroke-width: 2.4; marker-end: url(#arrow); }
      .step { fill: #e8f3ff; stroke: #1565c0; stroke-width: 2.3; }
      .decision { fill: #fff8e1; stroke: #ef6c00; stroke-width: 2.5; }
      .pending { fill: #fdecea; stroke: #c62828; stroke-width: 2.4; }
      .ok { fill: #ecf7ee; stroke: #2e7d32; stroke-width: 2.4; }
      .token { fill: #f2e8ff; stroke: #6a1b9a; stroke-width: 2.4; }
    </style>
  </defs>

  <rect class="canvas" width="1040" height="700"/>
  <text class="title" x="58" y="62">Fine-grained PAT：范围更细，但仍然受组织策略控制</text>

  <g filter="url(#shadow)">
    <rect class="step" x="90" y="122" width="220" height="78" rx="12"/>
    <text class="node-title" x="200" y="154">alice 创建</text>
    <text class="node-text" x="200" y="179">fine-grained PAT</text>

    <rect class="step" x="410" y="122" width="240" height="78" rx="12"/>
    <text class="node-title" x="530" y="154">选择目标仓库</text>
    <text class="node-text" x="530" y="179">example-org/resource-assets</text>

    <rect class="token" x="740" y="122" width="220" height="78" rx="12"/>
    <text class="node-title" x="850" y="154">申请权限</text>
    <text class="node-text" x="850" y="179">Contents write</text>

    <path class="decision" d="M 520 282 L 680 370 L 520 458 L 360 370 Z"/>
    <text class="node-title" x="520" y="356">example-org</text>
    <text class="node-text" x="520" y="380">是否需要审批?</text>

    <rect class="pending" x="135" y="516" width="190" height="74" rx="12"/>
    <text class="node-title" x="230" y="547">PAT Pending</text>
    <text class="node-text" x="230" y="570">组织尚未批准</text>

    <rect class="token" x="425" y="516" width="190" height="74" rx="12"/>
    <text class="node-title" x="520" y="547">workflow</text>
    <text class="node-text" x="520" y="570">使用 token</text>

    <rect class="pending" x="715" y="516" width="190" height="74" rx="12"/>
    <text class="node-title" x="810" y="547">GitHub API</text>
    <text class="node-text" x="810" y="570">返回 403</text>

    <rect class="ok" x="735" y="332" width="210" height="76" rx="12"/>
    <text class="node-title" x="840" y="363">已批准</text>
    <text class="node-text" x="840" y="387">可以按授权访问</text>
  </g>

  <path class="line" d="M 310 161 L 410 161"/>
  <path class="line" d="M 650 161 L 740 161"/>
  <path class="line" d="M 850 200 C 850 245, 718 320, 680 370"/>
  <path class="line" d="M 360 370 C 304 410, 244 462, 230 516"/>
  <text class="edge-label" x="298" y="430">需要</text>
  <path class="line" d="M 325 553 L 425 553"/>
  <path class="line" d="M 615 553 L 715 553"/>
  <path class="line" d="M 680 370 L 735 370"/>
  <text class="edge-label" x="710" y="358">已批准</text>
</svg>
