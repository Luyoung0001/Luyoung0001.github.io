<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">CoolDA Test Contract</title>
  <desc id="desc">A diagram showing functional test, runtime check, vector add benchmark, API description and scripted smoke test.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#24313f"/></marker><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#2f3a4a;stroke-width:2;rx:8}.blue{fill:#eef6ff;stroke:#1d5f99;stroke-width:2;rx:8}.green{fill:#eefaf2;stroke:#277244;stroke-width:2;rx:8}.gold{fill:#fff8e6;stroke:#9a6a00;stroke-width:2;rx:8}.text{font:16px sans-serif;fill:#18202a}.small{font:13px sans-serif;fill:#45515f}.title{font:22px sans-serif;font-weight:700;fill:#17202a}.line{stroke:#24313f;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="980" height="420"/>
  <text class="title" x="40" y="48">CoolDA Smoke Test Checks A Contract, Not Just A Print</text>
  <rect class="blue" x="60" y="102" width="168" height="78"/><text class="text" x="96" y="135">Matmul</text><text class="small" x="86" y="158">result equals CPU ref</text>
  <rect class="green" x="282" y="102" width="168" height="78"/><text class="text" x="330" y="135">Vecadd</text><text class="small" x="306" y="158">runtime fallback path</text>
  <rect class="gold" x="504" y="102" width="168" height="78"/><text class="text" x="548" y="135">Check</text><text class="small" x="532" y="158">heap/copy contracts</text>
  <rect class="box" x="726" y="102" width="168" height="78"/><text class="text" x="776" y="135">API</text><text class="small" x="752" y="158">visible semantics</text>
  <rect class="box" x="266" y="266" width="448" height="82"/><text class="text" x="386" y="298">Scripted Smoke Target</text><text class="small" x="318" y="324">build xOS, build Verilator, inject commands, grep required evidence</text>
  <path class="line" d="M144 180 C210 230 300 252 405 266"/>
  <path class="line" d="M366 180 C395 220 430 245 474 266"/>
  <path class="line" d="M588 180 C565 220 535 245 506 266"/>
  <path class="line" d="M810 180 C740 230 660 252 575 266"/>
  <text class="small" x="54" y="386">A smoke contract checks build, shell scripting, runtime scheduling, MMIO driver behavior, NPU results and simulator shutdown.</text>
