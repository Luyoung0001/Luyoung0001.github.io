<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">CoolDA CPU To NPU Path</title>
  <desc id="desc">A diagram showing host terminal to xOS shell, runtime, BSP, APB peripheral and Coolda NPU.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#24313f"/></marker><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#2f3a4a;stroke-width:2;rx:8}.blue{fill:#eef6ff;stroke:#1d5f99;stroke-width:2;rx:8}.green{fill:#eefaf2;stroke:#277244;stroke-width:2;rx:8}.gold{fill:#fff8e6;stroke:#9a6a00;stroke-width:2;rx:8}.text{font:16px sans-serif;fill:#18202a}.small{font:13px sans-serif;fill:#45515f}.title{font:22px sans-serif;font-weight:700;fill:#17202a}.line{stroke:#24313f;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="980" height="420"/>
  <text class="title" x="40" y="48">CoolDA Is A Minimal CPU-Controlled Accelerator Platform</text>
  <rect class="blue" x="54" y="112" width="145" height="78"/><text class="text" x="88" y="144">Host</text><text class="small" x="78" y="168">terminal / script</text>
  <rect class="box" x="240" y="112" width="145" height="78"/><text class="text" x="282" y="144">xOS</text><text class="small" x="272" y="168">lean shell</text>
  <rect class="green" x="426" y="112" width="145" height="78"/><text class="text" x="462" y="144">Runtime</text><text class="small" x="452" y="168">tile scheduler</text>
  <rect class="box" x="612" y="112" width="145" height="78"/><text class="text" x="666" y="144">BSP</text><text class="small" x="642" y="168">MMIO writes</text>
  <rect class="gold" x="798" y="112" width="145" height="78"/><text class="text" x="842" y="144">NPU</text><text class="small" x="826" y="168">4x4 int8 matmul</text>
  <path class="line" d="M199 151 H232"/><path class="line" d="M385 151 H418"/><path class="line" d="M571 151 H604"/><path class="line" d="M757 151 H790"/>
  <rect class="box" x="260" y="270" width="460" height="72"/><text class="text" x="370" y="300">Verilator SoC Simulation</text><text class="small" x="330" y="324">UART stdout, PS2 host input bypass, scriptable commands</text>
  <path class="line" d="M490 270 C500 236 500 212 500 192"/>
  <text class="small" x="54" y="386">A minimal accelerator platform: shell, runtime, MMIO driver, APB peripheral and a 4x4 NPU kernel.</text>
</svg>
