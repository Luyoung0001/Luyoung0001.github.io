<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title{font:700 28px sans-serif;fill:#0f172a}
      .sub{font:16px sans-serif;fill:#475569}
      .box{rx:12;ry:12;stroke-width:2}
      .txt{font:700 17px sans-serif;fill:#0f172a}
      .hint{font:13px sans-serif;fill:#475569}
      .arrow{stroke:#475569;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="54" y="56" class="title">C 到 RISC-VI 模拟器的端到端流水线</text>
  <text x="54" y="84" class="sub">关键不是某一条命令，而是 clang、llc、MC、runtime、binary 和 simulator 形成可验证闭环。</text>

  <rect x="50" y="145" width="130" height="78" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="80" y="177" class="txt">C source</text>
  <text x="73" y="201" class="hint">tests/*.c</text>

  <rect x="230" y="145" width="130" height="78" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="276" y="177" class="txt">clang</text>
  <text x="254" y="201" class="hint">emit LLVM IR</text>

  <rect x="410" y="145" width="130" height="78" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="449" y="177" class="txt">LLVM IR</text>
  <text x="446" y="201" class="hint">*.ll</text>

  <rect x="590" y="145" width="150" height="78" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="640" y="177" class="txt">llc</text>
  <text x="613" y="201" class="hint">+xvi32r backend</text>

  <rect x="790" y="145" width="150" height="78" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="820" y="177" class="txt">RISC-VI asm</text>
  <text x="849" y="201" class="hint">*.s</text>

  <rect x="990" y="145" width="150" height="78" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="1029" y="177" class="txt">llvm-mc</text>
  <text x="1020" y="201" class="hint">assemble object</text>

  <rect x="150" y="320" width="150" height="78" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="187" y="352" class="txt">linker</text>
  <text x="173" y="376" class="hint">AM runtime + ELF</text>

  <rect x="390" y="320" width="150" height="78" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="415" y="352" class="txt">objcopy</text>
  <text x="417" y="376" class="hint">flat binary</text>

  <rect x="630" y="320" width="170" height="78" class="box" fill="#ffedd5" stroke="#ea580c"/>
  <text x="662" y="352" class="txt">riscvi32r-sim</text>
  <text x="680" y="376" class="hint">execute binary</text>

  <rect x="890" y="320" width="160" height="78" class="box" fill="#f1f5f9" stroke="#64748b"/>
  <text x="927" y="352" class="txt">JSON / trace</text>
  <text x="912" y="376" class="hint">自动化验证结果</text>

  <path d="M180 184 H230" class="arrow"/>
  <path d="M360 184 H410" class="arrow"/>
  <path d="M540 184 H590" class="arrow"/>
  <path d="M740 184 H790" class="arrow"/>
  <path d="M940 184 H990" class="arrow"/>
  <path d="M1065 223 C1065 280 225 270 225 320" class="arrow"/>
  <path d="M300 359 H390" class="arrow"/>
  <path d="M540 359 H630" class="arrow"/>
  <path d="M800 359 H890" class="arrow"/>

  <text x="54" y="465" class="sub">读图方式：前半段是编译工具链，后半段是裸机运行与结果验证；RISC-VI 的关键开关出现在 llc 和 llvm-mc 的 +xvi32r。</text>
</svg>
