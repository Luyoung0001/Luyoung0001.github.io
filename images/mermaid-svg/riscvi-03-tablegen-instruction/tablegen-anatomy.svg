<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title{font:700 28px sans-serif;fill:#0f172a}
      .sub{font:16px sans-serif;fill:#475569}
      .box{rx:12;ry:12;stroke-width:2}
      .txt{font:700 18px sans-serif;fill:#0f172a}
      .hint{font:14px sans-serif;fill:#475569}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="54" y="58" class="title">一条 TableGen 机器指令包含哪些信息</text>
  <text x="54" y="88" class="sub">TableGen 不是只写助记符，它同时描述编码、操作数、谓词、调度和 IR 匹配。</text>

  <rect x="455" y="170" width="290" height="105" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="528" y="211" class="txt">XVI_MIN</text>
  <text x="495" y="238" class="hint">min rd, rs1, rs2</text>

  <rect x="70" y="135" width="250" height="86" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="104" y="170" class="txt">Encoding fields</text>
  <text x="104" y="195" class="hint">opcode / funct3 / funct7</text>

  <rect x="70" y="270" width="250" height="86" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="104" y="305" class="txt">Operands</text>
  <text x="104" y="330" class="hint">outs rd, ins rs1 rs2</text>

  <rect x="475" y="335" width="250" height="86" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="509" y="370" class="txt">Predicates</text>
  <text x="509" y="395" class="hint">HasVendorXRiscVI, IsRV32</text>

  <rect x="880" y="135" width="250" height="86" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="914" y="170" class="txt">Schedule</text>
  <text x="914" y="195" class="hint">WriteIMinMax / ReadIMinMax</text>

  <rect x="880" y="270" width="250" height="86" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="914" y="305" class="txt">IR pattern</text>
  <text x="914" y="330" class="hint">smin -> XVI_MIN</text>

  <path d="M320 178 C380 178 395 205 455 205" stroke="#64748b" stroke-width="2.2" fill="none"/>
  <path d="M320 313 C390 313 400 245 455 245" stroke="#64748b" stroke-width="2.2" fill="none"/>
  <path d="M600 335 V275" stroke="#64748b" stroke-width="2.2" fill="none"/>
  <path d="M880 178 C820 178 805 205 745 205" stroke="#64748b" stroke-width="2.2" fill="none"/>
  <path d="M880 313 C810 313 800 245 745 245" stroke="#64748b" stroke-width="2.2" fill="none"/>

  <rect x="190" y="442" width="820" height="42" rx="10" ry="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="222" y="469" class="hint">对 load/store/branch 指令，还必须认真设置 mayLoad、mayStore、isBranch、isTerminator 等属性。</text>
</svg>
