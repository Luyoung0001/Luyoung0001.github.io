<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">PE And Systolic Array Datapath</title>
  <desc id="desc">A diagram showing a PE multiply accumulate and a 4x4 array receiving A and B streams.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z" fill="#24313f"/></marker><style>.bg{fill:#f8fafc}.pe{fill:#eef6ff;stroke:#1d5f99;stroke-width:2;rx:6}.mac{fill:#fff8e6;stroke:#9a6a00;stroke-width:2;rx:8}.text{font:16px sans-serif;fill:#18202a}.small{font:13px sans-serif;fill:#45515f}.title{font:22px sans-serif;font-weight:700;fill:#17202a}.line{stroke:#24313f;stroke-width:2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="980" height="420"/>
  <text class="title" x="40" y="48">Processing Element: y = y_in + a * b</text>
  <rect class="mac" x="54" y="102" width="250" height="120"/>
  <text class="text" x="114" y="140">Single PE</text>
  <text class="small" x="96" y="170">product = a * b</text>
  <text class="small" x="92" y="196">sum = y_in + product</text>
  <path class="line" d="M28 132 H52"/><text class="small" x="18" y="124">a</text>
  <path class="line" d="M28 170 H52"/><text class="small" x="18" y="162">b</text>
  <path class="line" d="M28 208 H52"/><text class="small" x="0" y="200">y_in</text>
  <path class="line" d="M304 162 H352"/><text class="small" x="316" y="154">y_out</text>
  <text class="text" x="438" y="92">4x4 Array Teaching View</text>
  <g transform="translate(450,120)">
    <text class="small" x="120" y="-24">B row stream</text>
    <path class="line" d="M40 -12 V14"/><path class="line" d="M110 -12 V14"/><path class="line" d="M180 -12 V14"/><path class="line" d="M250 -12 V14"/>
    <text class="small" x="-118" y="62">A column stream</text>
    <path class="line" d="M-26 42 H12"/><path class="line" d="M-26 112 H12"/><path class="line" d="M-26 182 H12"/><path class="line" d="M-26 252 H12"/>
    <rect class="pe" x="20" y="20" width="56" height="56"/><rect class="pe" x="90" y="20" width="56" height="56"/><rect class="pe" x="160" y="20" width="56" height="56"/><rect class="pe" x="230" y="20" width="56" height="56"/>
    <rect class="pe" x="20" y="90" width="56" height="56"/><rect class="pe" x="90" y="90" width="56" height="56"/><rect class="pe" x="160" y="90" width="56" height="56"/><rect class="pe" x="230" y="90" width="56" height="56"/>
    <rect class="pe" x="20" y="160" width="56" height="56"/><rect class="pe" x="90" y="160" width="56" height="56"/><rect class="pe" x="160" y="160" width="56" height="56"/><rect class="pe" x="230" y="160" width="56" height="56"/>
    <rect class="pe" x="20" y="230" width="56" height="56"/><rect class="pe" x="90" y="230" width="56" height="56"/><rect class="pe" x="160" y="230" width="56" height="56"/><rect class="pe" x="230" y="230" width="56" height="56"/>
    <text class="small" x="37" y="54">PE</text><text class="small" x="107" y="54">PE</text><text class="small" x="177" y="54">PE</text><text class="small" x="247" y="54">PE</text>
  </g>
  <text class="small" x="54" y="382">The blog starts from rtl/core/pe.sv, then uses rtl/core/systolic_array_4x4.sv and rtl/common/pe_array_16x16.sv to connect teaching and implementation.</text>
</svg>
