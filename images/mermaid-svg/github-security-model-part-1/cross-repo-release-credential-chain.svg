<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 760" role="img" aria-labelledby="title desc">
  <title id="title">跨仓库发布时的身份与凭证链路</title>
  <desc id="desc">alice 的组织角色、仓库权限、workflow 凭证选择，以及 PAT 和 GitHub App 权限检查之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .canvas { fill: #fbfcfd; }
      .title { font: 700 26px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #263238; }
      .node-title { font: 700 16px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #1d2730; text-anchor: middle; }
      .node-text { font: 13px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #37474f; text-anchor: middle; }
      .edge-label { font: 700 12px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #344955; text-anchor: middle; }
      .line { fill: none; stroke: #2f4858; stroke-width: 2.2; marker-end: url(#arrow); }
      .soft { fill: #ffffff; stroke: #cfd8dc; stroke-width: 1.8; }
      .decision { fill: #fff8e1; stroke: #ef6c00; stroke-width: 2.4; }
      .user { fill: #e8f3ff; stroke: #1565c0; stroke-width: 2.4; }
      .ok { fill: #ecf7ee; stroke: #2e7d32; stroke-width: 2.2; }
      .warn { fill: #fdecea; stroke: #c62828; stroke-width: 2.2; }
      .app { fill: #f2e8ff; stroke: #6a1b9a; stroke-width: 2.2; }
    </style>
  </defs>

  <rect class="canvas" width="1260" height="760"/>
  <text class="title" x="62" y="58">同一个发布动作，换了凭证，权限链路就变了</text>

  <g filter="url(#shadow)">
    <rect class="user" x="70" y="126" width="160" height="84" rx="12"/>
    <text class="node-title" x="150" y="160">alice</text>
    <text class="node-text" x="150" y="185">GitHub 用户</text>

    <path class="decision" d="M 388 104 L 528 168 L 388 232 L 248 168 Z"/>
    <text class="node-title" x="388" y="154">alice 在 example-org</text>
    <text class="node-text" x="388" y="178">是什么角色?</text>

    <rect class="soft" x="620" y="86" width="210" height="76" rx="12"/>
    <text class="node-title" x="725" y="119">可以访问</text>
    <text class="node-text" x="725" y="143">被授权仓库</text>

    <rect class="ok" x="620" y="206" width="210" height="76" rx="12"/>
    <text class="node-title" x="725" y="239">可以管理</text>
    <text class="node-text" x="725" y="263">组织策略</text>

    <path class="decision" d="M 388 320 L 538 392 L 388 464 L 238 392 Z"/>
    <text class="node-title" x="388" y="378">alice 对 web-client</text>
    <text class="node-text" x="388" y="402">是什么权限?</text>

    <rect class="soft" x="620" y="354" width="230" height="76" rx="12"/>
    <text class="node-title" x="735" y="386">配置 web-client</text>
    <text class="node-text" x="735" y="410">secrets 和 workflow</text>

    <path class="decision" d="M 388 548 L 538 620 L 388 692 L 238 620 Z"/>
    <text class="node-title" x="388" y="606">workflow 使用</text>
    <text class="node-text" x="388" y="630">什么凭证?</text>

    <rect class="warn" x="616" y="500" width="218" height="70" rx="12"/>
    <text class="node-title" x="725" y="529">GITHUB_TOKEN</text>
    <text class="node-text" x="725" y="552">默认只能访问 web-client</text>

    <rect class="user" x="616" y="604" width="218" height="70" rx="12"/>
    <text class="node-title" x="725" y="633">alice PAT</text>
    <text class="node-text" x="725" y="656">代表 alice 访问目标仓库</text>

    <rect class="app" x="616" y="696" width="218" height="50" rx="12"/>
    <text class="node-title" x="725" y="726">GitHub App token</text>

    <path class="decision" d="M 1032 570 L 1158 638 L 1032 706 L 906 638 Z"/>
    <text class="node-title" x="1032" y="625">PAT 是否被</text>
    <text class="node-text" x="1032" y="649">org 批准?</text>

    <path class="decision" d="M 1032 410 L 1180 482 L 1032 554 L 884 482 Z"/>
    <text class="node-title" x="1032" y="468">App 是否安装到</text>
    <text class="node-text" x="1032" y="492">resource-assets 且有写权限?</text>
  </g>

  <path class="line" d="M 230 168 L 248 168"/>
  <path class="line" d="M 528 150 C 570 126, 585 124, 620 124"/>
  <text class="edge-label" x="574" y="121">member</text>
  <path class="line" d="M 528 188 C 570 232, 585 244, 620 244"/>
  <text class="edge-label" x="574" y="231">owner</text>

  <path class="line" d="M 725 162 C 725 260, 600 392, 538 392"/>
  <path class="line" d="M 538 392 L 620 392"/>
  <text class="edge-label" x="580" y="382">admin</text>

  <path class="line" d="M 735 430 C 710 512, 580 620, 538 620"/>
  <path class="line" d="M 538 602 C 572 548, 586 535, 616 535"/>
  <text class="edge-label" x="576" y="524">GITHUB_TOKEN</text>
  <path class="line" d="M 538 626 L 616 638"/>
  <text class="edge-label" x="578" y="625">alice PAT</text>
  <path class="line" d="M 538 664 C 574 716, 586 721, 616 721"/>
  <text class="edge-label" x="582" y="704">App token</text>

  <path class="line" d="M 834 638 L 906 638"/>
  <path class="line" d="M 834 721 C 910 690, 986 596, 1022 554"/>
</svg>
