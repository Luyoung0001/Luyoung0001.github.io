<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 700" role="img" aria-labelledby="title desc">
  <title id="title">NES 硬件加速总体结构</title>
  <desc id="desc">LoongArch32R CPU 通过 AXI 配置 confreg 和写 Boot RAM，NES accelerator 通过 Port-B 访问 Boot RAM，生成 6-bit color 并经过 framebuffer、palette ROM 输出到 HDMI，同时 step irq 反馈给 CPU。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4858"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00695c"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .canvas { fill: #fbfcfd; }
      .title { font: 700 27px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #263238; }
      .node-title { font: 700 17px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #1d2730; text-anchor: middle; }
      .node-text { font: 13px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #37474f; text-anchor: middle; }
      .edge-label { font: 700 12px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #344955; text-anchor: middle; }
      .line { fill: none; stroke: #2f4858; stroke-width: 2.4; marker-end: url(#arrow); }
      .bus { fill: none; stroke: #00695c; stroke-width: 2.6; marker-start: url(#arrow-teal); marker-end: url(#arrow-teal); }
      .cpu { fill: #e8f3ff; stroke: #1565c0; stroke-width: 2.4; }
      .reg { fill: #fff8e1; stroke: #ef6c00; stroke-width: 2.4; }
      .mem { fill: #e0f2f1; stroke: #00695c; stroke-width: 2.4; }
      .nes { fill: #f2e8ff; stroke: #6a1b9a; stroke-width: 2.6; }
      .video { fill: #ecf7ee; stroke: #2e7d32; stroke-width: 2.4; }
      .irq { fill: none; stroke: #c62828; stroke-width: 2.4; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="canvas" width="1260" height="700"/>
  <text class="title" x="58" y="60">NES 硬件加速：CPU 负责控制，FPGA 逻辑负责执行和出图</text>

  <g filter="url(#shadow)">
    <rect class="cpu" x="70" y="216" width="210" height="96" rx="12"/>
    <text class="node-title" x="175" y="256">LoongArch32R CPU</text>
    <text class="node-text" x="175" y="281">加载 ROM / 配置寄存器</text>

    <rect class="reg" x="370" y="118" width="220" height="92" rx="12"/>
    <text class="node-title" x="480" y="154">confreg</text>
    <text class="node-text" x="480" y="179">NES_CTRL / STATUS / ...</text>

    <rect class="reg" x="675" y="118" width="190" height="92" rx="12"/>
    <text class="node-title" x="770" y="154">NES control</text>
    <text class="node-text" x="770" y="179">run / step / pad</text>

    <rect class="mem" x="370" y="360" width="220" height="104" rx="12"/>
    <text class="node-title" x="480" y="395">Boot RAM</text>
    <text class="node-text" x="480" y="420">PRG / CHR / VRAM / WRAM</text>
    <text class="node-text" x="480" y="443">CPU 写入，NES 读取</text>

    <rect class="nes" x="675" y="304" width="220" height="124" rx="14"/>
    <text class="node-title" x="785" y="344">NES accelerator</text>
    <text class="node-text" x="785" y="369">6502 / PPU / APU</text>
    <text class="node-text" x="785" y="392">硬件并行执行</text>

    <rect class="video" x="980" y="234" width="210" height="86" rx="12"/>
    <text class="node-title" x="1085" y="268">NES framebuffer BRAM</text>
    <text class="node-text" x="1085" y="292">6-bit indexed color</text>

    <rect class="video" x="980" y="384" width="210" height="78" rx="12"/>
    <text class="node-title" x="1085" y="416">palette ROM</text>
    <text class="node-text" x="1085" y="440">index to RGB</text>

    <rect class="video" x="980" y="532" width="210" height="78" rx="12"/>
    <text class="node-title" x="1085" y="564">HDMI output</text>
    <text class="node-text" x="1085" y="588">屏幕输出</text>
  </g>

  <path class="line" d="M 280 244 C 316 190, 330 164, 370 164"/>
  <text class="edge-label" x="326" y="194">AXI</text>

  <path class="line" d="M 280 286 C 330 352, 340 412, 370 412"/>
  <text class="edge-label" x="328" y="366">AXI write</text>

  <path class="line" d="M 590 164 L 675 164"/>
  <text class="edge-label" x="632" y="150">control signals</text>

  <path class="line" d="M 770 210 L 785 304"/>

  <path class="bus" d="M 590 412 C 638 430, 660 408, 675 378"/>
  <text class="edge-label" x="632" y="444">Port-B</text>

  <path class="line" d="M 895 340 C 922 306, 946 282, 980 277"/>
  <text class="edge-label" x="946" y="302">6-bit color + scanline/cycle</text>

  <path class="line" d="M 1085 320 L 1085 384"/>
  <path class="line" d="M 1085 462 L 1085 532"/>

  <path class="line" d="M 280 312 C 500 650, 866 660, 1030 610"/>
  <text class="edge-label" x="620" y="638">hdmi_src_sel</text>

  <path class="irq" d="M 675 396 C 560 592, 204 520, 175 312"/>
  <text class="edge-label" x="426" y="572">step irq</text>
</svg>
